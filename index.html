<!DOCTYPE html>
<html lang="es">
  <head>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ImagenesWeb/LogoInvertido.png" />

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Perdidos</title>

    <!-- CSS -->
    <link rel="stylesheet" href="Assets/Estilos.css" />
  </head>

  <body>
<!-- HEADER -->
<header class="main-header">
  <div class="logotipo">
  <img src="ImagenesWeb/Logotipo.png" alt="Logo Perdidozy">
  </div>

  <button class="nav-toggle" id="nav-toggle" aria-controls="main-nav" aria-expanded="false">
    Menú
  </button>

  <nav class="main-nav" id="main-nav">
    <a href="#inicio">Inicio</a>
    <a href="#musica">Música</a>
    <a href="#tienda">Tienda</a>
    <a href="#contacto">Contacto</a>
  </nav>

  <div class="header-actions">
    <a href="#acerca" class="header-button">Acerca de</a>
  </div>
</header>

<!-- HERO -->
<main id="inicio" class="hero-inicio">
  <img src="./ImagenesWeb/Logo.png" alt="Logo Perdidozy grande" class="hero-logo" />
</main>
    <!-- MÚSICA -->
    <section id="musica" class="section musica-section">
      <div class="section-inner musica-layout">
        <div class="musica-cover"></div>

        <div class="musica-info">
          <h2>Música</h2>

          <p class="musica-tagline">
            Musica oficial de perdidos
          </p>

          <div class="musica-highlight">
            <h3>Sencillo</h3>
            <p class="musica-track">Agua Sucia</p>
          </div>

          <div class="musica-links">
            <a href="#" class="pill pill-spotify">Spotify</a>
            <a href="#" class="pill pill-youtube">YouTube</a>
            <a href="#" class="pill pill-instagram">Instagram</a>
          </div>
        </div>
      </div>
    </section>

    <!-- TIENDA -->
    <section id="tienda" class="section tienda-section">
      <div class="section-inner tienda-layout">
        <div class="tienda-info">
          <h2>Tienda</h2>
          <p class="tienda-tagline">
            Accesorios oficiales de Perdidos
          </p>
        </div>

        <div class="tienda-grid">
          <article class="tienda-item">
            <h3>Camiseta perdidos</h3>

          </article>

          <article class="tienda-item">
            <h3>Gorra Perdidos</h3>

          </article>

          <article class="tienda-item">
            <h3>Buso</h3>

          </article>
        </div>
      </div>
    </section>

    <!-- CONTACTO -->
    <section id="contacto" class="section contacto-section">
      <div class="section-inner contacto-layout">
        <div class="contacto-info">
          <h2>Contacto</h2>

          <p>
            Escríbenos a
            <strong>perd.idoz@gmail.com</strong>
          </p>
        </div>
      </div>
    </section>

    <!-- AUDIO -->
    <audio
      id="bg-music"
      src="MusicaDeFondo/AGUA SUCIA - DEMO.mp3"
      autoplay
      loop
    ></audio>

    <!-- JS -->
    <script src="Assets/Lenguaje.js"></script>
  </body>
</html>
